; 安装 pytest
; pip install pytest
; 查看 pytest 版本
; pytest --version

; pytest 配置文件
; 通常可以放在以下文件中：
; - pytest.ini        （最常见）
; - setup.cfg
; - pyproject.toml
[pytest]

; 指定 pytest 默认搜索测试用例的目录
testpaths = demo3/tests

; 测试文件的命名规则
; 只有符合该规则的文件才会被 pytest 自动识别为测试文件
python_files = *.py

; 测试类命名规则
; 只有以 Test 开头的类才会被识别为测试类
python_classes = Test*

; 测试函数命名规则
; pytest 只会执行以 test_ 开头的函数
python_functions = test_*

; 默认运行参数（等价于每次执行 pytest 时自动追加）
addopts =
    ; 保持现有 “收集全部 *.py 的策略”，
    ; 但明确忽略把两个 conftest.py 当测试文件收集，只作为夹具配置加载
    --ignore=demo3/conftest.py
    --ignore=demo3/tests/conftest.py
;    -v      ; verbose，显示更详细的测试信息
;    -q      ; quiet，简化输出
;    -s      ; 允许在测试中使用 print 并实时输出
;    -ra     ; 显示额外的测试结果信息（如 skipped、xfail 等）
;    --maxfail=1   ; 遇到 1 个失败后立即停止测试
;    --tb=short    ; 精简 traceback（错误堆栈信息）

; 忽略递归搜索的目录
; pytest 在发现测试文件时不会进入这些目录
norecursedirs =
    .git
    venv
    build
    dist

; 注册自定义标记，避免警告
markers =
    slow: 标记慢测试示例
    integration: 标记集成测试示例
    fast: 标记快速测试示例
    api: api tests
    db: database tests


; ==============================
; 如果没有 pytest 配置文件
; pytest 会按照默认规则自动发现测试
; ==============================

; 测试文件命名规则
; test_*.py
; *_test.py

; 测试函数命名规则
; test_*

; 测试类命名规则
; Test*
